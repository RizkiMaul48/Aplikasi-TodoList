      background: #475569;
    }
    /* Animasi CSS Transisi Halus */
    .fade-enter {
      opacity: 0;

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",

      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"

    let db = null;
    let auth = null;
    let isFirebaseReady = false;

    // Inisialisasi Firebase secara aman
    try {
      if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
        const app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        isFirebaseReady = true;
      }

      console.warn("Gagal inisialisasi Firebase Cloud. Berjalan dalam Offline Mode.", e);

    const IconVolume = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" /></svg>;

    const IconDatabase = () => <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75m-16.5-3.75v3.75m16.5 0v3.75C20.25 16.153 16.556 18 12 18s-8.25-1.847-8.25-4.125v-3.75m16.5 0v3.75" /></svg>;
    const IconUser = () => <svg className="w-6 h-6 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" /></svg>;

    const IconMail = () => <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0l-7.5-4.615a2.25 2.25 0 01-1.07-1.916V6.75" /></svg>;
    const IconLock = () => <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0V10.5m-2.25 0h13.5a2.25 2.25 0 012.25 2.25v6.75a2.25 2.25 0 01-2.25 2.25H4.5a2.25 2.25 0 01-2.25-2.25v-6.75a2.25 2.25 0 012.25-2.25z" /></svg>;
    const IconKey = () => <svg className="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-.1.43-.563A6 6 0 1121.75 8.25z" /></svg>;

    function App() {
      const [user, setUser] = useState(null);
      const [todos, setTodos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showNotifCenter, setShowNotifCenter] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [isAlarmPlaying, setIsAlarmPlaying] = useState(false);
      const [activeAlarmTasks, setActiveAlarmTasks] = useState([]);

      const notifRef = useRef(null);
      const audioCtxRef = useRef(null);
      const alarmIntervalRef = useRef(null);
      const alertedTaskIds = useRef(new Set());

      // Halaman Autentikasi
      const [authMode, setAuthMode] = useState('login'); // login | register
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authConfirmPassword, setAuthConfirmPassword] = useState('');
      const [authLoading, setAuthLoading] = useState(false);

      // Konfigurasi Tema
      const [isDark, setIsDark] = useState(() => {
        const saved = localStorage.getItem('theme');
        return saved === 'dark';
      });

      // Suara/Alarm Konfigurasi
      const [isSoundEnabled, setIsSoundEnabled] = useState(() => {
        const saved = localStorage.getItem('sound_enabled');
        return saved !== 'false';
      });

      // Form Rencana Baru
      const [formData, setFormData] = useState({
        title: '', category: 'Pekerjaan', priority: 'Sedang', dueDate: ''
      });

      // Pencarian & Filter
      const [searchTerm, setSearchTerm] = useState('');
      const [filter, setFilter] = useState({ status: 'Semua', sort: 'Terbaru' });

      // Menampilkan Popup Toast Premium di Tengah Layar
      const showToast = (message, type = 'success') => {
        const id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
        setToasts((prev) => [...prev, { id, message, type }]);
        setTimeout(() => {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }, 3500);
      };

      // Sinkronisasi Tema Class
      useEffect(() => {
        if (isDark) {
          document.documentElement.classList.add('dark');
          localStorage.setItem('theme', 'dark');
        } else {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('theme', 'light');
        }
      }, [isDark]);

      // Menyimpan Preferensi Audio
      useEffect(() => {
        localStorage.setItem('sound_enabled', isSoundEnabled);
      }, [isSoundEnabled]);

      useEffect(() => {
        if (!isFirebaseReady) {
          // Mode Offline Cadangan
          const localData = localStorage.getItem('local_todos');
          if (localData) setTodos(JSON.parse(localData));
          setUser({ uid: 'local-guest', email: 'offline-guest@tugasku.pro', isAnonymous: true });
          setLoading(false);
          return;
        }

        // Dapatkan status perubahan Auth real-time
        const unsubscribeAuth = auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          if (currentUser) {
            const unsubscribeTodos = db.collection('artifacts')
              .doc('task-pro-loop-alarm')
              .collection('users')
              .doc(currentUser.uid)
              .collection('todos')
              .orderBy('createdAt', 'desc')
              .onSnapshot((snap) => {
                const loadedTodos = [];
                snap.forEach((doc) => {
                  loadedTodos.push({ id: doc.id, ...doc.data() });
                });
                setTodos(loadedTodos);
                setLoading(false);
              }, (err) => {
                console.error("Firestore loading error:", err);
                setLoading(false);
              });
            return () => unsubscribeTodos();
          } else {
            setLoading(false);
          }
        });

        return () => unsubscribeAuth();
      }, []);

      // Backup ke LocalStorage jika berjalan dalam offline
      useEffect(() => {
        if (!isFirebaseReady || user?.uid === 'local-guest') {
          localStorage.setItem('local_todos', JSON.stringify(todos));
        }
      }, [todos]);

      // Tutup panel lonceng ketika klik di area luar
      useEffect(() => {
        function handleClickOutside(event) {
          if (notifRef.current && !notifRef.current.contains(event.target)) {
            setShowNotifCenter(false);
          }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => document.removeEventListener("mousedown", handleClickOutside);
      }, []);

      const startContinuousAlarm = () => {
        if (alarmIntervalRef.current) return;
        if (!isSoundEnabled) return;

        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;

          const ctx = new AudioContext();
          audioCtxRef.current = ctx;

          const playBeep = (time, duration, frequency) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(frequency, time);
            gain.gain.setValueAtTime(0.15, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + duration);
            osc.start(time);
            osc.stop(time + duration);
          };

          const beepSequence = () => {
            if (ctx.state === 'suspended') {
              ctx.resume();
            }
            const now = ctx.currentTime;
            playBeep(now, 0.1, 1000);
            playBeep(now + 0.15, 0.1, 1000);
          };

          beepSequence();
          alarmIntervalRef.current = setInterval(beepSequence, 1000);
          setIsAlarmPlaying(true);
        } catch (err) {
          console.warn("Audio Context API Error", err);
        }
      };

      const stopContinuousAlarm = () => {
        if (alarmIntervalRef.current) {
          clearInterval(alarmIntervalRef.current);
          alarmIntervalRef.current = null;
        }
        if (audioCtxRef.current) {
          audioCtxRef.current.close();
          audioCtxRef.current = null;
        }
        setIsAlarmPlaying(false);
        setActiveAlarmTasks([]);
      };

      useEffect(() => {
        return () => {
          if (alarmIntervalRef.current) clearInterval(alarmIntervalRef.current);
        };
      }, []);

      const handleRegister = async (e) => {
        e.preventDefault();
        if (!isFirebaseReady) {
          showToast("Firebase Cloud tidak terhubung dengan benar. Gunakan Akun Tamu.", "warning");
          return;
        }
        if (authPassword !== authConfirmPassword) {
          showToast("Konfirmasi sandi tidak cocok!", "error");
          return;
        }

        setAuthLoading(true);
        try {
          await auth.createUserWithEmailAndPassword(authEmail, authPassword);
          showToast("Akun Anda berhasil dibuat! Selamat datang 🎉", "success");
          setAuthEmail('');
          setAuthPassword('');
          setAuthConfirmPassword('');
        } catch (err) {
          let errorMsg = "Pendaftaran gagal.";
          if (err.code === 'auth/email-already-in-use') errorMsg = "Email sudah terdaftar!";
          if (err.code === 'auth/weak-password') errorMsg = "Sandi terlalu lemah (Min 6 karakter).";
          showToast(errorMsg, "error");
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!isFirebaseReady) {
          showToast("Firebase Cloud tidak siap.", "error");
          return;
        }

        setAuthLoading(true);
        try {
          await auth.signInWithEmailAndPassword(authEmail, authPassword);
          showToast("Berhasil masuk ke Workspace Anda! 💼", "success");
          setAuthEmail('');
          setAuthPassword('');
        } catch (err) {
          showToast("Email atau kata sandi Anda salah.", "error");
        } finally {
          setAuthLoading(false);
        }
      };

      const handleGoogleLogin = async () => {
        if (!isFirebaseReady) {
          showToast("Opsi ini memerlukan konfigurasi Firebase Cloud aktif.", "error");
          return;
        }

        setAuthLoading(true);
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
          await auth.signInWithPopup(provider);
          showToast("Masuk berhasil melalui Google Account! 🚀", "success");
        } catch (err) {
          console.error(err);
          showToast("Gagal masuk dengan Google.", "error");
        } finally {
          setAuthLoading(false);
        }
      };

      const handleAnonymousLogin = () => {
        if (!isFirebaseReady) {
          showToast("Mode Offline diaktifkan. Data tersimpan lokal.", "info");
          setUser({ uid: 'local-guest', email: 'guest@tugasku.pro', isAnonymous: true });
          return;
        }

        setAuthLoading(true);
        auth.signInAnonymously()
          .then(() => showToast("Masuk sebagai Tamu Sementara.", "info"))
          .catch(() => showToast("Gagal masuk sebagai tamu.", "error"))
          .finally(() => setAuthLoading(false));
      };

      const handleLogout = async () => {
        stopContinuousAlarm();
        if (!isFirebaseReady || user?.uid === 'local-guest') {
          setUser(null);
          setTodos([]);
          showToast("Keluar berhasil dari sesi Tamu.", "info");
          return;
        }

        try {
          await auth.signOut();
          showToast("Sesi berakhir, sampai jumpa lagi!", "info");
        } catch (err) {
          showToast("Gagal mengeluarkan akun.", "error");
        }
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.title.trim()) return;

        const payload = { 
          title: formData.title.trim(),
          category: formData.category,
          priority: formData.priority,
          dueDate: formData.dueDate,
          completed: false, 
          createdAt: new Date().toISOString() 
        };
        
        try {
          if (isFirebaseReady && user && user.uid !== 'local-guest') {
            await db.collection('artifacts')
              .doc('task-pro-loop-alarm')
              .collection('users')
              .doc(user.uid)
              .collection('todos')
              .add(payload);
          } else {
            setTodos(prev => [{ ...payload, id: Date.now().toString() }, ...prev]);
          }
          showToast(`Tugas "${payload.title}" berhasil ditambahkan!`, 'success');
        } catch (err) {
          showToast('Gagal menyimpan tugas.', 'error');
        }

        setFormData({ title: '', category: 'Pekerjaan', priority: 'Sedang', dueDate: '' });
      };

      const toggleComplete = async (todo) => {
        try {
          const willBeCompleted = !todo.completed;
          if (isFirebaseReady && user && user.uid !== 'local-guest') {
            await db.collection('artifacts')
              .doc('task-pro-loop-alarm')
              .collection('users')
              .doc(user.uid)
              .collection('todos')
              .doc(todo.id)
              .update({ completed: willBeCompleted });
          } else {
            setTodos(prev => prev.map(t => t.id === todo.id ? { ...t, completed: willBeCompleted } : t));
          }

          if (willBeCompleted) {
            showToast(`Hebat! Tugas "${todo.title}" selesai dikerjakan 🎉`, 'success');
            if (activeAlarmTasks.some(t => t.id === todo.id)) {
              const updatedActive = activeAlarmTasks.filter(t => t.id !== todo.id);
              setActiveAlarmTasks(updatedActive);
              if (updatedActive.length === 0) stopContinuousAlarm();
            }
          } else {
            showToast(`Tugas "${todo.title}" dikembalikan ke antrean aktif.`, 'info');
          }
        } catch (err) {
          showToast('Gagal mengubah status tugas.', 'error');
        }
      };

      const deleteTask = async (id) => {
        try {
          if (isFirebaseReady && user && user.uid !== 'local-guest') {
            await db.collection('artifacts')
              .doc('task-pro-loop-alarm')
              .collection('users')
              .doc(user.uid)
              .collection('todos')
              .doc(id)
              .delete();
          } else {
            setTodos(prev => prev.filter(t => t.id !== id));
          }
          showToast('Tugas berhasil dihapus.', 'info');
          
          if (activeAlarmTasks.some(t => t.id === id)) {
            const updatedActive = activeAlarmTasks.filter(t => t.id !== id);
            setActiveAlarmTasks(updatedActive);
            if (updatedActive.length === 0) stopContinuousAlarm();
          }
        } catch (err) {
          showToast('Gagal menghapus tugas.', 'error');
        }
      };

      const notifications = useMemo(() => {
        const now = new Date();
        const alerts = [];
        
        todos.forEach(todo => {
          if (todo.completed || !todo.dueDate) return;
          
          const deadline = new Date(todo.dueDate);
          const diffMs = deadline - now;
          const diffHours = diffMs / (1000 * 60 * 60);

          if (diffMs < 0) {
            alerts.push({
              id: todo.id,
              title: todo.title,
              type: 'overdue',
              message: 'Telah melewati batas waktu yang ditentukan!',
              dueDate: todo.dueDate
            });
          } else if (diffHours <= 24) {
            const hoursLeft = Math.max(0, Math.ceil(diffHours));
            alerts.push({
              id: todo.id,
              title: todo.title,
              type: 'urgent',
              message: hoursLeft === 0 ? 'Tenggat waktu tersisa kurang dari 1 jam!' : `Tenggat waktu tersisa kurang dari ${hoursLeft} jam!`,
              dueDate: todo.dueDate
            });
          }
        });
        
        return alerts;
      }, [todos]);

      // Mengontrol alarm dari pendeteksi tenggat waktu
      useEffect(() => {
        if (notifications.length === 0) {
          if (isAlarmPlaying) stopContinuousAlarm();
          return;
        }

        const newUnalertedTasks = notifications.filter(notif => !alertedTaskIds.current.has(notif.id));

        if (newUnalertedTasks.length > 0) {
          setActiveAlarmTasks(prev => {
            const merged = [...prev];
            newUnalertedTasks.forEach(item => {
              if (!merged.some(m => m.id === item.id)) merged.push(item);
            });
            return merged;
          });

          if (isSoundEnabled) {
            startContinuousAlarm();
          }

          newUnalertedTasks.forEach(notif => {
            const textMessage = notif.type === 'overdue' 
              ? `⚠️ DEADLINE TERLEWAT: "${notif.title}"!`
              : `⏰ TENGGAT MENDEKATI: "${notif.title}" kurang dari 24 jam!`;
            
            showToast(textMessage, notif.type === 'overdue' ? 'error' : 'warning');
            alertedTaskIds.current.add(notif.id);
          });
        }

        const currentNotifIds = new Set(notifications.map(n => n.id));
        alertedTaskIds.current.forEach(id => {
          if (!currentNotifIds.has(id)) alertedTaskIds.current.delete(id);
        });

      }, [notifications, isSoundEnabled]);

      // Pemrosesan Pencarian dan Penyaringan Rencana Kerja
      const processedTodos = useMemo(() => {
        return todos
          .filter(t => {
            const matchSearch = t.title.toLowerCase().includes(searchTerm.toLowerCase());
            const matchStatus = filter.status === 'Semua' ? true : (filter.status === 'Selesai' ? t.completed : !t.completed);
            return matchSearch && matchStatus;
          })
          .sort((a, b) => {
            if (filter.sort === 'Prioritas') {
              const p = { 'Tinggi': 3, 'Sedang': 2, 'Rendah': 1 };
              return p[b.priority] - p[a.priority];
            }
            if (filter.sort === 'Deadline') {
              return new Date(a.dueDate || '9999-12-31') - new Date(b.dueDate || '9999-12-31');
            }
            return new Date(b.createdAt) - new Date(a.createdAt);
          });
      }, [todos, searchTerm, filter]);

      const stats = {
        total: todos.length,
        done: todos.filter(t => t.completed).length,
        high: todos.filter(t => t.priority === 'Tinggi' && !t.completed).length
      };

      // Tampilan Loading Screen Responsif
      if (loading) return (
        <div className="h-screen w-full flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-950 transition-colors">

          <p className="mt-4 text-xs sm:text-sm text-slate-500 dark:text-slate-400 font-medium animate-pulse text-center px-4">Menghubungkan ke Workspace...</p>
        </div>
      );

      if (!user) {
        return (

            <div className="absolute top-4 right-4 sm:top-6 sm:right-6">
              <button 
                onClick={() => setIsDark(!isDark)}
                className="p-2.5 sm:p-3 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300 shadow-md hover:scale-105 active:scale-95 transition-all"
              >
                {isDark ? <IconSun /> : <IconMoon />}
              </button>
            </div>

            <div className="max-w-md w-full px-2 sm:px-0 my-auto">
              <div className="flex flex-col items-center mb-6 sm:mb-8">
                <div className="w-12 h-12 sm:w-14 sm:h-14 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-xl shadow-indigo-300 dark:shadow-none mb-3">
                  <svg className="text-white w-6 h-6 sm:w-8 sm:h-8" fill="none" stroke="currentColor" strokeWidth="3.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                </div>
                <h1 className="text-2xl sm:text-3xl font-black bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-400">
                  TugasKu PRO
                </h1>
                <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[2px] mt-1">Cloud Workspace Tracker</p>
              </div>

              <div className="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[24px] sm:rounded-[32px] p-5 sm:p-8 shadow-xl">
                <div className="flex bg-slate-100 dark:bg-slate-800/80 p-1 rounded-2xl mb-6 sm:mb-8">
                  <button 
                    onClick={() => setAuthMode('login')}
                    className={`flex-1 py-2.5 sm:py-3 text-xs sm:text-sm font-bold rounded-xl transition-all ${
                      authMode === 'login' 
                        ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-200 shadow-sm' 
                        : 'text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300'
                    }`}
                  >
                    Masuk
                  </button>
                  <button 
                    onClick={() => setAuthMode('register')}
                    className={`flex-1 py-2.5 sm:py-3 text-xs sm:text-sm font-bold rounded-xl transition-all ${
                      authMode === 'register' 
                        ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-200 shadow-sm' 
                        : 'text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300'
                    }`}
                  >
                    Daftar
                  </button>
                </div>

                <form onSubmit={authMode === 'login' ? handleLogin : handleRegister} className="space-y-4 sm:space-y-5">
                  <div>
                    <label className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Alamat Email</label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2"><IconMail /></span>
                      <input 
                        type="email"
                        required
                        placeholder="nama@email.com"
                        className="w-full pl-11 pr-4 py-3 sm:py-4 bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs sm:text-sm transition-all dark:text-white"
                        value={authEmail}
                        onChange={(e) => setAuthEmail(e.target.value)}
                      />
                    </div>
                  </div>

                  <div>
                    <label className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5 block">Kata Sandi</label>
                    <div className="relative">
                      <span className="absolute left-4 top-1/2 -translate-y-1/2"><IconLock /></span>
                      <input 
                        type="password"
                        required
                        placeholder="••••••••"
                        className="w-full pl-11 pr-4 py-3 sm:py-4 bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs sm:text-sm transition-all dark:text-white"
                        value={authPassword}
                        onChange={(e) => setAuthPassword(e.target.value)}
                      />
                    </div>
                  </div>

                  {authMode === 'register' && (
                    <div className="space-y-1.5">
                      <label className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1 block">Konfirmasi Kata Sandi</label>
                      <div className="relative">
                        <span className="absolute left-4 top-1/2 -translate-y-1/2"><IconKey /></span>
                        <input 
                          type="password"
                          required
                          placeholder="••••••••"
                          className="w-full pl-11 pr-4 py-3 sm:py-4 bg-slate-50 dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs sm:text-sm transition-all dark:text-white"
                          value={authConfirmPassword}
                          onChange={(e) => setAuthConfirmPassword(e.target.value)}
                        />
                      </div>
                    </div>
                  )}

                  <button 
                    type="submit"
                    disabled={authLoading}
                    className="w-full py-3.5 sm:py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold shadow-xl shadow-indigo-100 dark:shadow-none flex items-center justify-center gap-2.5 transition-all active:scale-[0.98] disabled:opacity-50 text-xs sm:text-sm"
                  >
                    {authLoading ? (
                      <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                    ) : (
                      authMode === 'login' ? 'MASUK KE WORKSPACE' : 'BUAT AKUN BARU'
                    )}
                  </button>
                </form>

                <div className="relative my-5 sm:my-6 flex items-center justify-center">
                  <span className="absolute w-full border-t border-slate-200 dark:border-slate-800"></span>
                  <span className="relative bg-white dark:bg-slate-900 px-3 text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-wider">Atau Masuk Dengan</span>
                </div>

                <div className="space-y-2.5">
                  <button 
                    onClick={handleGoogleLogin}
                    disabled={authLoading}
                    className="w-full py-3.5 bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-705 border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 rounded-2xl font-bold flex items-center justify-center gap-2.5 transition-all shadow-sm active:scale-[0.98] text-xs sm:text-sm"
                  >
                    <svg className="w-4.5 h-4.5" viewBox="0 0 24 24" fill="none">
                      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    Google Workspace
                  </button>

                  <button 
                    onClick={handleAnonymousLogin}
                    disabled={authLoading}
                    className="w-full py-3.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700/50 rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-xs sm:text-sm"
                  >
                    <IconUser />
                    Masuk Sebagai Tamu (Offline)
                  </button>
                </div>
              </div>
            </div>

            {/* POP-UP TOASTS AUTH */}
            <div className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none p-4">
              <div className="flex flex-col gap-2.5 max-w-sm w-full pointer-events-auto">
                {toasts.map((toast) => (
                  <div key={toast.id} className="fade-enter fade-enter-active">
                    <div className={`p-4 sm:p-5 rounded-2xl sm:rounded-3xl shadow-2xl border-2 flex items-start gap-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md ${
                      toast.type === 'success' 
                        ? 'border-emerald-500/40 text-emerald-900 dark:text-emerald-300' 
                        : toast.type === 'warning' 
                          ? 'border-amber-500/40 text-amber-900 dark:text-amber-300' 
                          : toast.type === 'error'
                            ? 'border-rose-500/40 text-rose-900 dark:text-rose-300'
                            : 'border-indigo-500/40 text-indigo-900 dark:text-indigo-300'
                    }`}>
                      <div className="mt-0.5 shrink-0">
                        {toast.type === 'success' && <IconCheckCircle />}
                        {toast.type === 'warning' && <IconAlertTriangle />}
                        {toast.type === 'error' && <IconAlertCircle />}
                      </div>
                      <div className="flex-1 text-xs sm:text-sm font-bold leading-relaxed">{toast.message}</div>
                      <button onClick={() => setToasts(prev => prev.filter(t => t.id !== toast.id))} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 shrink-0 self-center">
                        <IconX />
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
          
          {/* --- RESPONSIVE STICKY NAVBAR --- */}
          <nav className="sticky top-0 z-40 bg-white/85 dark:bg-slate-900/85 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-3">
              <div className="flex items-center gap-2.5 sm:gap-3 min-w-0">
                <div className="w-9 h-9 sm:w-10 sm:h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200 dark:shadow-none shrink-0">
                  <svg className="text-white w-5.5 h-5.5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg>
                </div>
                <div className="truncate">
                  <h1 className="text-lg sm:text-xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-500 dark:from-indigo-400 dark:to-violet-400 truncate">
                    TugasKu PRO
                  </h1>
                  <p className="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-[1.5px] truncate hidden xs:block">Workspace & Tracker</p>
                </div>
              </div>
              
              <div className="flex items-center gap-1.5 sm:gap-2 shrink-0">
                
                {/* Alarm Mute Toggle */}
                <button 
                  onClick={() => {
                    const updated = !isSoundEnabled;
                    setIsSoundEnabled(updated);
                    if (!updated && isAlarmPlaying) stopContinuousAlarm();
                    showToast(updated ? "Suara alarm diaktifkan." : "Suara alarm dibisukan.", "info");
                  }}
                  className={`p-2 sm:p-2.5 rounded-xl transition-all ${
                    isSoundEnabled 
                      ? 'bg-emerald-50 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400 font-bold' 
                      : 'bg-slate-100 dark:bg-slate-800 text-slate-400 dark:text-slate-500'
                  } hover:scale-110 active:scale-95`}
                  title={isSoundEnabled ? "Matikan Alarm Suara" : "Aktifkan Alarm Suara"}
                >
                  {isSoundEnabled ? <IconVolume /> : <IconVolumeMute />}
                </button>
                
                {/* Notification Bell Panel */}
                <div className="relative" ref={notifRef}>
                  <button 
                    onClick={() => setShowNotifCenter(!showNotifCenter)}
                    className="p-2 sm:p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 active:scale-95 transition-all relative"
                  >
                    {notifications.length > 0 ? (
                      <>
                        <IconBellRing />
                        <span className="absolute -top-1 -right-1 bg-rose-600 text-white text-[9px] sm:text-[10px] font-bold w-4.5 h-4.5 sm:w-5 sm:h-5 rounded-full flex items-center justify-center border-2 border-white dark:border-slate-900">
                          {notifications.length}
                        </span>
                      </>
                    ) : (
                      <IconBell />
                    )}
                  </button>

                  {/* Dropdown Notifikasi */}
                  {showNotifCenter && (
                    <div className="absolute right-0 mt-3 w-72 sm:w-80 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl overflow-hidden z-50 py-2">
                      <div className="px-4 py-2 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center">
                        <span className="font-bold text-[10px] sm:text-xs uppercase tracking-wider text-slate-400">Pemberitahuan</span>
                        <button
                          onClick={() => {
                            if (isAlarmPlaying) {
                              stopContinuousAlarm();
                              showToast("Suara alarm dihentikan.", "info");
                            } else {
                              if (!isSoundEnabled) setIsSoundEnabled(true);
                              startContinuousAlarm();
                              showToast("Memulai loop tes alarm. Klik lagi untuk mematikan.", "info");
                            }
                          }}
                          className={`text-[9px] sm:text-[10px] px-2 py-1 rounded-lg font-bold transition-all ${
                            isAlarmPlaying 
                              ? 'bg-rose-50 dark:bg-rose-950 text-rose-600 dark:text-rose-400' 
                              : 'bg-slate-100 dark:bg-slate-800 hover:text-indigo-600'
                          }`}
                        >
                          {isAlarmPlaying ? "Stop Tes" : "Tes Alarm"}
                        </button>
                      </div>

                      <div className="max-h-64 overflow-y-auto">
                        {notifications.length === 0 ? (
                          <div className="px-4 py-8 text-center text-slate-400 dark:text-slate-500 text-xs">
                            Semua tugas aman! Tidak ada deadline mendesak.
                          </div>
                        ) : (
                          notifications.map((notif) => (
                            <div key={notif.id} className="p-3 border-b border-slate-100 dark:border-slate-800/50 flex gap-2.5 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-all">
                              <div className="mt-0.5">
                                {notif.type === 'overdue' ? <IconAlertCircle /> : <IconAlertTriangle />}
                              </div>
                              <div className="flex-1 min-w-0">
                                <p className="text-xs font-bold text-slate-800 dark:text-slate-200 truncate">{notif.title}</p>
                                <p className="text-[10px] text-slate-500 dark:text-slate-400 mt-0.5">{notif.message}</p>
                                <p className="text-[9px] font-bold text-indigo-500 dark:text-indigo-400 mt-1 flex items-center gap-1">
                                  <IconCalendar className="w-3 h-3" />
                                  {new Date(notif.dueDate).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' })}
                                </p>
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  )}
                </div>

                {/* Theme Switcher Toggle */}
                <button 
                  onClick={() => {
                    const target = !isDark;
                    setIsDark(target);
                    showToast(target ? "Beralih ke Mode Gelap 🌙" : "Beralih ke Mode Terang ☀️", "info");
                  }}
                  className="p-2 sm:p-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:scale-110 active:scale-95 transition-all"
                >
                  {isDark ? <IconSun /> : <IconMoon />}
                </button>

                {/* Tombol Logout */}
                <button 
                  onClick={handleLogout}
                  className="p-2 sm:p-2.5 rounded-xl bg-rose-50 dark:bg-rose-950/20 text-rose-600 dark:text-rose-400 hover:scale-110 active:scale-95 transition-all"
                  title="Log Out Sesi"
                >
                  <IconLogout />
                </button>
                
                <div className="hidden lg:flex items-center gap-2 px-3 py-2 rounded-xl bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 text-xs font-bold border border-indigo-100 dark:border-indigo-800/50">
                  <IconDatabase />
                  {isFirebaseReady && !user.isAnonymous ? 'Cloud Sync' : 'Offline Mode'}
                </div>
              </div>
            </div>
          </nav>

          {/* Banner Peringatan Deadline Global */}
          {notifications.length > 0 && (
            <div className="bg-amber-500/10 dark:bg-amber-500/5 border-b border-amber-500/20 text-amber-800 dark:text-amber-300">
              <div className="max-w-6xl mx-auto px-4 sm:px-6 py-2.5 text-xs flex items-center justify-between gap-3">
                <div className="flex items-center gap-2 min-w-0">
                  <IconAlertTriangle />
                  <p className="truncate text-[11px] sm:text-xs">
                    Ada <strong>{notifications.length} tugas</strong> mendesak/terlewat! {isAlarmPlaying ? '🔊 ALARM AKTIF' : '🔕 Alarm dibisukan.'}
                  </p>
                </div>
                <button onClick={() => setShowNotifCenter(true)} className="underline hover:text-amber-600 font-bold shrink-0 transition text-[11px] sm:text-xs">
                  Periksa
                </button>
              </div>
            </div>
          )}

          {}
          <main className="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">

            {/* Profil Sesi Banner */}
            <div className="mb-6 sm:mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3.5 p-4 sm:p-5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl sm:rounded-3xl shadow-sm">
              <div className="flex items-center gap-3 min-w-0">
                <div className="w-10 h-10 sm:w-11 sm:h-11 rounded-xl bg-indigo-50 dark:bg-indigo-950/50 flex items-center justify-center text-indigo-600 dark:text-indigo-400 shrink-0">
                  <IconUser />
                </div>
                <div className="min-w-0">
                  <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Workspace Terbuka</p>
                  <h2 className="text-sm sm:text-base font-bold text-slate-800 dark:text-slate-200 truncate max-w-[220px] xs:max-w-[300px] md:max-w-[450px]">
                    {user.email || 'Sesi Tamu Terbuka'}
                  </h2>
                </div>
              </div>
              <div className="text-[11px] text-slate-400 dark:text-slate-500 flex sm:flex-col items-center sm:items-end justify-between sm:justify-center border-t sm:border-t-0 border-slate-100 dark:border-slate-800 pt-2 sm:pt-0">
                <span className="sm:hidden">Sesi ID:</span>
                <span className="font-mono bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded text-[10px]">{user.uid.slice(0, 8)}...</span>
              </div>
            </div>
            
            {/* Kartu Statistik */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5 mb-8 sm:mb-12">
              <StatCard icon={<svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>} label="Semua Tugas" value={stats.total} type="indigo" />
              <StatCard icon={<svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 013 3h-15a3 3 0 013-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.875V11.25M9 10.5H8.25c-.621 0-1.125-.503-1.125-1.125V9M12 9V3M9 6h6m-6 3h6" /></svg>} label="Selesai" value={stats.done} type="emerald" />
              <StatCard icon={<IconAlertTriangle />} label="Prioritas" value={stats.high} type="rose" />
              
              <div className="bg-gradient-to-br from-indigo-600 to-indigo-800 rounded-2xl sm:rounded-3xl p-5 sm:p-6 text-white shadow-xl shadow-indigo-200 dark:shadow-none relative overflow-hidden group">
                <div className="relative z-10">
                  <p className="text-indigo-100/80 text-[10px] sm:text-xs font-bold uppercase tracking-wider">Tingkat Penyelesaian</p>
                  <h3 className="text-2xl sm:text-3xl font-black mt-1">
                    {stats.total > 0 ? Math.round((stats.done / stats.total) * 100) : 0}%
                  </h3>
                  <div className="mt-4 h-1.5 w-full bg-white/20 rounded-full overflow-hidden">
                     <div className="h-full bg-white rounded-full transition-all duration-500" style={{ width: `${stats.total > 0 ? (stats.done/stats.total)*100 : 0}%` }}></div>
                  </div>
                </div>
              </div>
            </div>

            {}
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 sm:gap-10">
              
              {/* --- SISI KIRI: DAFTAR TUGAS --- */}
              <div className="lg:col-span-7 order-2 lg:order-1">
                <div className="flex flex-col sm:flex-row gap-3.5 sm:gap-4 items-center justify-between mb-6 sm:mb-8">
                  <div className="relative w-full sm:w-72">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2"><IconSearch /></span>
                    <input 
                      type="text" 
                      placeholder="Cari tugas Anda..." 
                      className="w-full pl-11 pr-4 py-2.5 sm:py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs sm:text-sm transition-all dark:text-white"
                      value={searchTerm}
                      onChange={e => setSearchTerm(e.target.value)}
                    />
                  </div>

                  <div className="flex w-full sm:w-auto justify-between bg-slate-200/50 dark:bg-slate-800/50 p-1 rounded-2xl border border-slate-200 dark:border-slate-700">
                    <TabButton active={filter.sort === 'Terbaru'} label="Terbaru" onClick={() => setFilter({...filter, sort: 'Terbaru'})} />
                    <TabButton active={filter.sort === 'Prioritas'} label="Prioritas" onClick={() => setFilter({...filter, sort: 'Prioritas'})} />
                    <TabButton active={filter.sort === 'Deadline'} label="Deadline" onClick={() => setFilter({...filter, sort: 'Deadline'})} />
                  </div>
                </div>

                <div className="space-y-3.5 sm:space-y-4">
                  {processedTodos.map((todo) => (
                    <TaskItem 
                      key={todo.id} 
                      todo={todo} 
                      onToggle={() => toggleComplete(todo)} 
                      onDelete={() => deleteTask(todo.id)}
                    />
                  ))}

                  {processedTodos.length === 0 && (
                    <div className="py-16 sm:py-24 text-center">
                      <h4 className="text-slate-900 dark:text-slate-100 font-bold text-base sm:text-lg">Semua bersih!</h4>
                      <p className="text-slate-500 dark:text-slate-500 text-xs sm:text-sm mt-1">Belum ada tugas yang sesuai.</p>
                    </div>
                  )}
                </div>
              </div>

              {/* --- SISI KANAN: FORMULIR INPUT --- */}
              <div className="lg:col-span-5 order-1 lg:order-2">
                <div className="bg-white dark:bg-slate-900 rounded-[24px] sm:rounded-[32px] p-5 sm:p-8 border border-slate-200 dark:border-slate-800 shadow-sm lg:sticky lg:top-28">
                  <div className="mb-6 sm:mb-8">
                    <h3 className="text-lg sm:text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                      <svg className="w-5.5 h-5.5 sm:w-6 sm:h-6 text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" /></svg>
                      Aktivitas Baru
                    </h3>
                    <p className="text-slate-400 dark:text-slate-500 text-xs sm:text-sm mt-1">Tambahkan rencana kerja atau tugas harian baru Anda dengan waktu spesifik.</p>
                  </div>

                  <form onSubmit={handleSubmit} className="space-y-4 sm:space-y-5">
                    <div>
                      <label className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-600 uppercase tracking-widest mb-1.5 block">Nama Tugas</label>
                      <input 
                        required
                        placeholder="Contoh: Kirim Proposal & Pitching..."
                        className="w-full px-4 sm:px-5 py-3 sm:py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-xs sm:text-sm transition-all dark:text-white"
                        value={formData.title}
                        onChange={e => setFormData({...formData, title: e.target.value})}
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-600 uppercase tracking-widest mb-1.5 block">Kategori</label>
                        <select 
                          className="w-full px-3 sm:px-4 py-3 sm:py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-xs sm:text-sm dark:text-white cursor-pointer"
                          value={formData.category}
                          onChange={e => setFormData({...formData, category: e.target.value})}
                        >
                          {['Pekerjaan', 'Pribadi', 'Belanja', 'Edukasi'].map(c => <option key={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-600 uppercase tracking-widest mb-1.5 block">Prioritas</label>
                        <select 
                          className="w-full px-3 sm:px-4 py-3 sm:py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-xs sm:text-sm dark:text-white cursor-pointer"
                          value={formData.priority}
                          onChange={e => setFormData({...formData, priority: e.target.value})}
                        >
                          {['Tinggi', 'Sedang', 'Rendah'].map(p => <option key={p}>{p}</option>)}
                        </select>
                      </div>
                    </div>

                    <div>
                      <label className="text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-600 uppercase tracking-widest mb-1.5 block">Batas Waktu (Tanggal & Jam)</label>
                      <div className="relative">
                        <span className="absolute left-4 top-1/2 -translate-y-1/2"><IconCalendar /></span>
                        <input 
                          type="datetime-local"
                          required
                          className="w-full pl-11 pr-4 py-3 sm:py-4 bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl outline-none text-xs sm:text-sm dark:text-white cursor-pointer"
                          value={formData.dueDate}
                          onChange={e => setFormData({...formData, dueDate: e.target.value})}
                        />
                      </div>
                    </div>

                    <button className="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold flex items-center justify-center gap-2 transition-all active:scale-[0.98] text-xs sm:text-sm shadow-lg shadow-indigo-100 dark:shadow-none">
                      <IconPlus />
                      TAMBAHKAN TUGAS
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </main>

          {/* --- POPUP DI TENGAH: ALARM MENYALA (LOOPING) --- */}
          {isAlarmPlaying && activeAlarmTasks.length > 0 && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-slate-900 w-[92%] max-w-md rounded-[24px] sm:rounded-[32px] p-6 sm:p-8 shadow-2xl border-2 border-amber-500/50 text-center animate-bounce">
                <div className="w-16 h-16 sm:w-20 sm:h-20 bg-amber-100 dark:bg-amber-950/50 rounded-full flex items-center justify-center mx-auto mb-5 border-4 border-amber-500">
                  <svg className="w-8 h-8 sm:w-10 sm:h-10 text-amber-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.25a.75.75 0 00-.75.75v.234c-2.893.13-5.25 2.53-5.25 5.516v1.243c0 .829-.328 1.623-.914 2.21l-1.254 1.253a2.25 2.25 0 001.59 3.844h13.116a2.25 2.25 0 001.59-3.844l-1.254-1.252A3.13 3.13 0 0117.25 10V8.75c0-2.986-2.357-5.386-5.25-5.516V3a.75.75 0 00-.75-.75z" /><path d="M14.25 18a2.25 2.25 0 11-4.5 0h4.5z" /></svg>
                </div>

                <h3 className="text-xl sm:text-2xl font-black text-slate-900 dark:text-white tracking-tight">⏰ ALARM AKTIF!</h3>
                <p className="text-xs sm:text-sm text-slate-500 dark:text-slate-400 mt-2">Pola audio digital berbunyi karena batas waktu tugas terlewati atau kritis.</p>

                <div className="mt-5 p-3.5 bg-slate-50 dark:bg-slate-800/50 rounded-2xl max-h-32 overflow-y-auto text-left space-y-2.5">
                  <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Daftar Pemicu:</p>
                  {activeAlarmTasks.map((task) => (
                    <div key={task.id} className="flex justify-between items-center text-[11px] sm:text-xs">
                      <span className="font-bold truncate max-w-[150px] sm:max-w-[200px] text-slate-800 dark:text-slate-200">{task.title}</span>
                      <span className="text-[9px] font-black text-rose-500 uppercase">{new Date(task.dueDate) < new Date() ? 'TERLEWAT' : 'MENDEKATI'}</span>
                    </div>
                  ))}
                </div>

                <div className="mt-6">
                  <button onClick={stopContinuousAlarm} className="w-full py-3 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-2xl transition-all shadow-lg hover:scale-105 active:scale-95 text-xs sm:text-sm">
                    Matikan Suara Alarm
                  </button>
                </div>
              </div>
            </div>
          )}

          {}
          {/* --- POP-UP TOAST CONTAINER DI TENGAH LAYAR --- */}
          <div className="fixed inset-0 z-50 flex items-center justify-center pointer-events-none p-4">
            <div className="flex flex-col gap-2.5 max-w-sm w-full pointer-events-auto">
              {toasts.map((toast) => (
                <div key={toast.id} className="fade-enter fade-enter-active">
                  <div className={`p-4 sm:p-5 rounded-2xl sm:rounded-3xl shadow-2xl border-2 flex items-start gap-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md ${
                    toast.type === 'success' 
                      ? 'border-emerald-500/40 text-emerald-900 dark:text-emerald-300' 
                      : toast.type === 'warning' 
                        ? 'border-amber-500/40 text-amber-900 dark:text-amber-300' 
                        : toast.type === 'error'
                          ? 'border-rose-500/40 text-rose-900 dark:text-rose-300'
                          : 'border-indigo-500/40 text-indigo-900 dark:text-indigo-300'
                  }`}>
                    <div className="mt-0.5 shrink-0">
                      {toast.type === 'success' && <IconCheckCircle />}
                      {toast.type === 'warning' && <IconAlertTriangle />}
                      {toast.type === 'error' && <IconAlertCircle />}
                    </div>
                    
                    <div className="flex-1 text-xs sm:text-sm font-bold leading-relaxed">{toast.message}</div>
                    
                    <button onClick={() => setToasts(prev => prev.filter(t => t.id !== toast.id))} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 shrink-0 self-center">
                      <IconX />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>

        </div>
      );
    }

    // --- REUSABLE STAT CARD ---
    function StatCard({ icon, label, value, type }) {
      const styles = {
        indigo: 'bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 border-indigo-100 dark:border-indigo-800/50',
        emerald: 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400 border-emerald-100 dark:border-emerald-800/50',
        rose: 'bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 border-rose-100 dark:border-rose-800/50'
      };
      
      return (
        <div className="bg-white dark:bg-slate-900 p-4 sm:p-5 rounded-2xl sm:rounded-3xl border border-slate-200 dark:border-slate-800 flex items-center gap-4 transition-all">
          <div className={`w-11 h-11 sm:w-12 sm:h-12 rounded-xl sm:rounded-2xl flex items-center justify-center border shrink-0 ${styles[type]}`}>
            {icon}
          </div>
          <div className="min-w-0">
            <p className="text-slate-400 dark:text-slate-500 text-[9px] sm:text-[10px] font-black uppercase tracking-widest truncate">{label}</p>
            <p className="text-2xl sm:text-3xl font-black text-slate-900 dark:text-white leading-none mt-1">{value}</p>
          </div>
        </div>
      );
    }

    // --- REUSABLE TAB BUTTON ---
    function TabButton({ label, active, onClick }) {
      return (
        <button 
          onClick={onClick}
          className={`px-3 sm:px-4 py-1.5 sm:py-2.5 rounded-[12px] sm:rounded-[14px] text-[10px] sm:text-xs font-bold transition-all ${active ? 'bg-white dark:bg-slate-700 text-indigo-600 dark:text-indigo-300 shadow-sm' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}
        >
          {label}
        </button>
      );
    }

    // --- REUSABLE TASK ITEM ---
    function TaskItem({ todo, onToggle, onDelete }) {
      const priorityStyles = {
        'Tinggi': 'bg-rose-50 dark:bg-rose-950/30 text-rose-600 dark:text-rose-400 border-rose-100 dark:border-rose-900/30',
        'Sedang': 'bg-amber-50 dark:bg-amber-950/30 text-amber-600 dark:text-amber-400 border-amber-100 dark:border-amber-900/30',
        'Rendah': 'bg-emerald-50 dark:bg-emerald-950/30 text-emerald-600 dark:text-emerald-400 border-emerald-100 dark:border-emerald-900/30'
      };

      const isOverdue = useMemo(() => {
        if (todo.completed || !todo.dueDate) return false;
        return new Date(todo.dueDate) < new Date();
      }, [todo.completed, todo.dueDate]);

      return (
        <div className={`group flex items-center justify-between p-4 sm:p-5 bg-white dark:bg-slate-900 border ${
          isOverdue ? 'border-rose-300 dark:border-rose-950/70 shadow-[0_0_10px_rgba(244,63,94,0.08)]' : 'border-slate-200 dark:border-slate-800'
        } rounded-[20px] sm:rounded-[24px] hover:border-indigo-300 dark:hover:border-indigo-700 transition-all shadow-sm ${todo.completed ? 'opacity-50' : ''}`}>
          <div className="flex items-center gap-3 sm:gap-5 flex-1 min-w-0">
            <button onClick={onToggle} className="shrink-0 transition-transform active:scale-75">
              {todo.completed ? <IconCheckCircle /> : <IconCircle />}
            </button>
            
            <div className="min-w-0">
              <h4 className={`text-sm sm:text-base font-bold truncate transition-all dark:text-white ${todo.completed ? 'line-through text-slate-400 dark:text-slate-600' : ''}`}>
                {todo.title}
              </h4>
              <div className="flex flex-wrap items-center gap-2 mt-1.5">
                <span className="flex items-center gap-1 text-[9px] sm:text-[10px] font-black text-slate-400 dark:text-slate-600 uppercase">
                  <IconTag /> {todo.category}
                </span>
                <span className={`text-[8px] sm:text-[9px] font-black px-1.5 sm:px-2.5 py-0.5 sm:py-1 rounded-lg border uppercase tracking-wider ${priorityStyles[todo.priority]}`}>
                  {todo.priority}
                </span>
                {todo.dueDate && (
                  <span className={`flex items-center gap-1 text-[9px] sm:text-[10px] font-black ${isOverdue ? 'text-rose-600 dark:text-rose-400 font-bold' : 'text-slate-400 dark:text-slate-600'}`}>
                    <IconClock className={isOverdue ? "animate-spin w-3 h-3 text-rose-500" : "w-3 h-3"} /> 
                    {new Date(todo.dueDate).toLocaleString('id-ID', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}
                    {isOverdue && ' (TERLEWAT)'}
                  </span>
                )}
              </div>
            </div>
          </div>

          {/* md:opacity-0 & md:group-hover:opacity-100 membuat tombol HAPUS selalu muncul di HP/Tablet, dan muncul saat di-hover saja jika di Desktop */}
          <div className="flex items-center gap-1 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
            <button onClick={onDelete} className="p-2 sm:p-3 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-950/30 rounded-xl transition-all">
              <IconTrash />
            </button>
          </div>
        </div>
      );
    }

    // Render ke root div
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
